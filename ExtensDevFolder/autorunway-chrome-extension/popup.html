<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autorunway 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #ffffff;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #1a1a1a;
      text-align: center;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover {
      background: #f5f5f5;
    }

    .tab.active {
      border-bottom-color: #007bff;
      color: #007bff;
      font-weight: 500;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .section {
      margin-bottom: 16px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-item {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #1a1a1a;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: #007bff;
      color: white;
    }

    .btn-primary:hover {
      background: #0056b3;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-warning {
      background: #ffc107;
      color: #212529;
    }

    .btn-warning:hover {
      background: #e0a800;
    }

    .status {
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 8px;
    }

    .status-success {
      background: #d4edda;
      color: #155724;
    }

    .status-warning {
      background: #fff3cd;
      color: #856404;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
    }

    .status-info {
      background: #d1ecf1;
      color: #0c5460;
    }

    .folder-info {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      padding: 8px;
      background: #fff;
      border-radius: 4px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .spinner {
      border: 2px solid #f3f3f3;
      border-top: 2px solid #007bff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #007bff;
    }

    .form-group textarea {
      min-height: 60px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
    }

    .template-list {
      margin-top: 8px;
    }

    .template-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: #fff;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .template-item .template-name {
      font-weight: 500;
    }

    .template-item .template-text {
      color: #666;
      flex: 1;
      margin-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .template-item .btn-remove {
      padding: 2px 6px;
      font-size: 11px;
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }

    .log-container {
      max-height: 300px;
      overflow-y: auto;
      background: #1e1e1e;
      border-radius: 4px;
      padding: 8px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
    }

    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid #333;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-time {
      color: #888;
    }

    .log-level-info {
      color: #4fc3f7;
    }

    .log-level-warn {
      color: #ffb74d;
    }

    .log-level-error {
      color: #ef5350;
    }

    .log-level-debug {
      color: #81c784;
    }

    .log-category {
      color: #ba68c8;
    }

    .log-message {
      color: #e0e0e0;
    }

    .progress-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #007bff, #00d4ff);
      transition: width 0.3s;
    }
  </style>
</head>

<body>
  <h1>🎬 Autorunway</h1>

  <div class="tabs">
    <div class="tab active" data-tab="stats">统计</div>
    <div class="tab" data-tab="config">配置</div>
    <div class="tab" data-tab="logs">日志</div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>加载中...</div>
  </div>

  <div id="content" style="display: none;">
    <div id="tab-stats" class="tab-content active">
      <div class="section">
        <div id="statusMessage" class="status status-info">
          正在连接...
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">图片统计</div>
        <div class="stats">
          <div class="stat-item">
            <div class="stat-value" id="totalStat">0</div>
            <div class="stat-label">总数</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="pendingStat">0</div>
            <div class="stat-label">待处理</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="completedStat">0</div>
            <div class="stat-label">已完成</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="failedStat">0</div>
            <div class="stat-label">失败</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="retryableStat">0</div>
            <div class="stat-label">可重试</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="avgRetryStat">0</div>
            <div class="stat-label">平均重试</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">操作</div>
        <button id="selectFolderBtn" class="btn btn-primary">📁 重新选择文件夹</button>
        <button id="retryFailedBtn" class="btn btn-warning">🔄 重试失败任务</button>
        <button id="resetBtn" class="btn btn-secondary">🔁 重置所有图片</button>
        <button id="clearBtn" class="btn btn-danger">🗑️ 清除所有数据</button>
      </div>

      <div id="folderInfo" class="folder-info" style="display: none;">
        <div><strong>当前文件夹:</strong></div>
        <div id="folderName" style="margin-top: 4px;">未选择</div>
      </div>
    </div>

    <div id="tab-config" class="tab-content">
      <div class="section">
        <div class="section-title">提示词设置</div>
        <div class="form-group">
          <label>当前提示词</label>
          <textarea id="promptText" placeholder="输入自定义提示词..."></textarea>
        </div>
        <button id="savePromptBtn" class="btn btn-primary">保存提示词</button>

        <div class="template-list">
          <div class="section-title" style="margin-top: 12px;">提示词模板</div>
          <div id="templateList"></div>
        </div>

        <div class="form-group" style="margin-top: 12px;">
          <label>添加新模板</label>
          <div class="form-row">
            <input type="text" id="templateName" placeholder="模板名称">
            <input type="text" id="templateText" placeholder="模板内容">
          </div>
          <button id="addTemplateBtn" class="btn btn-secondary" style="margin-top: 8px;">添加模板</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">重试设置</div>
        <div class="form-row">
          <div class="form-group">
            <label>最大重试次数</label>
            <input type="number" id="maxRetries" min="0" max="10" value="3">
          </div>
          <div class="form-group">
            <label>重试延迟 (ms)</label>
            <input type="number" id="retryDelay" min="1000" max="60000" value="5000">
          </div>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="exponentialBackoff" checked>
          <label for="exponentialBackoff">指数退避</label>
        </div>
      </div>

      <div class="section">
        <div class="section-title">时间设置 (秒)</div>
        <div class="form-row">
          <div class="form-group">
            <label>上传后等待</label>
            <input type="number" id="waitAfterUpload" min="1" max="60" value="3">
          </div>
          <div class="form-group">
            <label>生成后等待</label>
            <input type="number" id="waitAfterGenerate" min="1" max="60" value="3">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>移除后等待</label>
            <input type="number" id="waitAfterRemove" min="1" max="60" value="3">
          </div>
          <div class="form-group">
            <label>4K后等待</label>
            <input type="number" id="waitAfter4K" min="1" max="60" value="3">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>生成超时</label>
            <input type="number" id="generateTimeout" min="30" max="600" value="300">
          </div>
          <div class="form-group">
            <label>下载超时</label>
            <input type="number" id="downloadTimeout" min="10" max="120" value="60">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">自动化设置</div>
        <div class="checkbox-group">
          <input type="checkbox" id="stopOnError" checked>
          <label for="stopOnError">连续错误时停止</label>
        </div>
        <div class="form-row" style="margin-top: 8px;">
          <div class="form-group">
            <label>最大连续错误</label>
            <input type="number" id="maxConsecutiveErrors" min="1" max="20" value="5">
          </div>
          <div class="form-group">
            <label>任务间隔 (秒)</label>
            <input type="number" id="pauseBetweenTasks" min="0" max="60" value="2">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">下载设置</div>
        <div class="form-group">
          <label>文件名前缀</label>
          <input type="text" id="filenamePrefix" value="runway_">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="includeTimestamp" checked>
          <label for="includeTimestamp">包含时间戳</label>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="includeRandom" checked>
          <label for="includeRandom">包含随机数</label>
        </div>
      </div>

      <button id="saveConfigBtn" class="btn btn-primary">保存所有配置</button>
      <button id="resetConfigBtn" class="btn btn-secondary">重置为默认</button>
    </div>

    <div id="tab-logs" class="tab-content">
      <div class="section">
        <div class="section-title">日志筛选</div>
        <div class="form-row">
          <div class="form-group">
            <label>日志级别</label>
            <select id="logLevel">
              <option value="">全部</option>
              <option value="info">Info</option>
              <option value="warn">Warn</option>
              <option value="error">Error</option>
              <option value="debug">Debug</option>
            </select>
          </div>
          <div class="form-group">
            <label>显示数量</label>
            <select id="logLimit">
              <option value="50">50 条</option>
              <option value="100">100 条</option>
              <option value="200">200 条</option>
              <option value="500">500 条</option>
            </select>
          </div>
        </div>
        <button id="refreshLogsBtn" class="btn btn-secondary">刷新日志</button>
        <button id="clearLogsBtn" class="btn btn-danger">清除日志</button>
        <button id="exportLogsBtn" class="btn btn-primary">导出日志</button>
      </div>

      <div class="section">
        <div class="section-title">日志记录</div>
        <div id="logContainer" class="log-container">
          <div style="color: #888; text-align: center; padding: 20px;">暂无日志</div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
